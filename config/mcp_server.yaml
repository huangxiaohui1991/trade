# A-Stock Trading MCP Server 配置
#
# 启动方式：
#   bin/trade mcp
# 业务日期解释默认按 Asia/Shanghai；事件时间戳仍使用 UTC ISO
#
# 外部 Agent 连接配置示例（放到 Agent 自己的 MCP 配置中）：
#   {
#     "mcpServers": {
#       "astock_trading-trade": {
#         "command": "/path/to/a-stock-trading/bin/trade",
#         "args": ["mcp"],
#         "env": {
#           "ASTOCK_DATABASE_URL": "mysql+pymysql://user:password@127.0.0.1:33306/astock_trading?charset=utf8mb4"
#         }
#       }
#     }
#   }

server:
  name: astock_trading-trade
  transport: stdio

# 查询类 tools 自动批准（无副作用）
auto_approve:
  - trade_market_signal
  - trade_portfolio
  - trade_pool_status
  - trade_score_history
  - trade_trade_events
  - trade_check_risk
  - trade_check_portfolio_risk

# 需要确认的 tools（有副作用）
require_confirm:
  - trade_run_pipeline
  - trade_backtest
