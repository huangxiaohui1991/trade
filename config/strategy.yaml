# 评分权重（满分10）
scoring:
  weights:
    technical: 2      # 技术信号（MA20/MA60/量能）
    fundamental: 3    # 基本面（ROE/营收/现金流）
    flow: 2           # 资金（主力/北向）
    sentiment: 3      # 舆情（TrendRadar）

  thresholds:
    buy: 7            # >=7 可买入
    watch: 5          # >=5 可观察池
    reject: 4          # <=4 一票否决

  veto:               # 任一触发直接不买
    - below_ma20
    - limit_up_today
    - consecutive_outflow
    - red_market

# 风控参数
risk:
  stop_loss: 0.04     # 4% 止损
  absolute_stop: 0.07 # 7% 绝对止损
  take_profit:
    t1_pct: 0.15      # +15% 卖 1/3
    t1_drawdown: 0.05  # 回撤 5% 卖第二批
    t2_drawdown: 0.08 # 回撤 8% 清仓
  time_stop_days: 15
  position:
    total_max: 0.60   # 总仓位上限
    single_max: 0.20  # 单只上限
    weekly_max: 2      # 每周最多2笔

# 大盘择时
market_timer:
  green_days: 3        # 连续3日站上MA20 -> GREEN
  red_days: 5          # 连续5日跌破MA20 -> RED
  clear_days_ma60: 15  # MA60下方15日 -> CLEAR

screening:
  # mx-stocks-screener 自然语言查询词（优先调用东方财富妙想接口）
  # 为空则跳过 mx skill，直接用 akshare 原生候选池
  mx_query: "站上MA20，市盈率TTM低于40，成交额超1亿，股价5-200元，剔除ST"
  mx_select_type: "A股"

capital: 450286
